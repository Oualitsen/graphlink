
directive @glRepository(glType: String!, glIdType: String!) on INTERFACE



interface Entity {
    id: ID!
}

type User {
    id: ID!
    name: String!
    middleName: String
    cars: [Car!]!
}

type Car {
    id: ID!
    make: String!
    model: String!
    userId: ID!
    ownerId: ID!
}

interface UserRepository @glRepository(glIdType: "id", glType: "User") {
    _: String
}

interface CarRepository @glRepository(glIdType: "id", glType: "Car") {
    _: String
}

