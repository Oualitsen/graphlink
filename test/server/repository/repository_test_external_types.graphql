
directive @glRepository(glType: String!, glIdType: String!) on INTERFACE
directive @glExternal(glClass: String!) on OBJECT | INPUT_OBJECT


type User {
    id: ID!
    name: String!
    middleName: String
}

scalar Pagebale @glExternal(glClass: "org.springframework.data.domain.Pageable")

scalar ExternalUser @glExternal(glClass: "com.mycompany.ExternalUser")

interface UserRepository @glRepository(glIdType: "id", glType: "User") {
    findAll(pagebale: Pagebale!): [ExternalUser!]!
    countElements: Int!
}

