

interface User {
  firstName: String!
  lastName: String!
}

type Admin implements User {
  firstName: String!
  lastName: String!

  username: String!
}

type Assistant implements User {
  firstName: String!
  lastName: String!

  username: String!
  password: String!
}



type Query {
  getAdmin: Admin!
  getAssitant: Assistant!
  getUser: User!
}

query getUser {
  myUser:getUser @glTypeName(name: "MyUser") {
    ... on Admin @glTypeName(name: "AdminEEEE") {
      firstName lastName username
    }
    ... on Assistant @glTypeName(name: "Assistant222") {
    firstName lastName  username password
    }
  } 
}