



input PageIndex {
  index: Int!
  page: Int!
}

type Product {
  id: ID!
  name: String!
  price: Float!
  wasPrice: Float
  brand: Brand!
}

type Brand {
  name: String!
  country: String!
  
}

input ProductInput {
  name: String!
  price: Float!
  wasPrice: Float
}

type Query {

  getProducts(pageIndex: PageIndex): [Product!]!
  getProductById(id: ID!): Product!

  getAllProducts(): [Product!]!

  getCount(): Int!


}



query getProducts($pageIndex: PageIndex!, $id: ID!) @glTypeName(name: "ProductResponse") {

  getProducts(pageIndex: $pageIndex) @glTypeName(name: "P1") {
    id, name, price, wasPrice
  }

  getProductById(id: $id)  @glTypeName(name: "P2"){
    id, name, price, wasPrice
  }


}

