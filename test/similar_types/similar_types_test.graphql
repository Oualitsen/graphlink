type Product {
    id: ID!
    name: String!
    price: Int!
    wasPrice: Int
    description: String
}

type Query {
    getProduct: Product!
    getProductById(id: ID!): Product!
}

query getProduct($id: ID!) {
    getProduct @glTypeName(name: "Prduct1") {
        id name price
    }   

    getProductById(id: $id) @glTypeName(name: "Prduct2") {
        name price id
    }
}