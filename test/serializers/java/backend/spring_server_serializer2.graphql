



  
type User {
    id: ID!
    name: String!
}

type Car {
    id: ID!
    make: String!
    model: String!
}

type UserCar  @glSkipOnServer(mapTo: "User") {
    car: Car 
    user: User! 
}

type Animal {
    name: String
}
type Owner {
    name: String
}

type OwnerWithAnimal @glSkipOnServer(mapTo: "Owner") {
    owner: Owner!
    animal: Animal
}

type OwnerWithAnimal2 @glSkipOnServer(batch: false) {
    owner: Owner!
    animal: Animal
}

type OwnerWithAnimal3 @glSkipOnServer() {
    owner: Owner!
    animal: Animal
}

type Query {
    getUserCar: UserCar
    getOwnerWithAnimal2: OwnerWithAnimal2
    getOwnwers: [OwnerWithAnimal!]
    getOwnwers3: [OwnerWithAnimal3!]
}



  