



  
type User {
    id: ID!
    name: String!
    middleName: String
    cars: [Car!]!  @glSkipOnServer
    password: String! @glSkipOnClient
}

type Car {
    make: String!
    model: String!
    userId: ID! @glSkipOnClient
    owner: Owner! @glSkipOnServer
    ownerId: ID! @glSkipOnClient
}

type Owner {
    id: ID!
}

type Query {

   getUser: User
   getUserById(id: ID!): User
   getUsers(name: String, middle: String): [User!]!
   getCarById(id: ID!): Car!
   getCarCount(userId: ID!): Int! @glServiceName(name: "CarService")
   getUserCount: Int! @glServiceName(name: "UserService")
   getSomethingCount: Int!

}

type Subscription {
    watchUser(userId: ID!): User! 
    watchCars(userId: ID!): [Car]! @glServiceName(name: "User")
}

  