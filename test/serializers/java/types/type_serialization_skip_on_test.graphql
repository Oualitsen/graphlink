


directive @glSkipOnServer()
on FIELD|FIELD_DEFINITION|OBJECT|INTERFACE|INPUT_OBJECT|INPUT_FIELD_DEFINITION


directive @glSkipOnClient()
on FIELD|FIELD_DEFINITION|OBJECT|INTERFACE|INPUT_OBJECT|INPUT_FIELD_DEFINITION
    
type User {

    id: String! 
    name: String!
    middleName: String

    companyId: String! @glSkipOnClient()
    company: Company! @glSkipOnServer()
}

type Company {
    id: String!
    name: String!
}


type SkipType @glSkipOnServer() {
    id: String!
}

enum Gender @glSkipOnServer() {
    male, female
}

input SkipInput @glSkipOnServer(){
    name: String!
}


  