
directive @JsonProperty(
    value: String!
    glAnnotation: Boolean = true
    glClass: String = "@com.fasterxml.jackson.annotation.JsonProperty"
    glOnClient: Boolean = true
    glOnServer: Boolean = true

) on OBJECT | INPUT_OBJECT | INTERFACE | FIELD_DEFINITION

directive @FieldNameConstants(
    glAnnotation: Boolean = true
    glClass: String = "@lombok.experimental.FieldNameConstants"
    glOnClient: Boolean = true
    glOnServer: Boolean = true

) on OBJECT | INPUT_OBJECT | INTERFACE


type Person {
    name: String!
    age: Int,
    married: Boolean
}

input PersonInput {
    name: String!
    age: Int!
}

type Car @FieldNameConstants {
    model: String!  @JsonProperty(value: "car_model")
    make: String @JsonProperty(value: "car_make")
}

input CarInput @FieldNameConstants {
    model: String! @JsonProperty(value: "car_model")
    make: String @JsonProperty(value: "car_make")
}

interface Entity {
    id: String!
    creationDate: String
}

type MyType implements Entity {
    id: String!
    creationDate: String
    name: String
}

