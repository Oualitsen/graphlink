
directive @glRepository(
  glClass: String = "org.springframework.data.mongodb.repository.MongoRepository"
) on FIELD_DEFINITION

directive @gqQuery(
  value: String
  nativeQuery: Boolean = false
  countQuery: String
  countProjection: String
  name: String
  countName: String
  glClass: String = "org.springframework.data.jpa.repository.Query"
  glAnnotation: Boolean = true
  glOnClient: Boolean = false
  glOnServer: Boolean = true
) on FIELD_DEFINITION

directive @gqParam(
  name: String!
  glClass: String = "org.springframework.data.repository.query.Param",
  glAnnotation: Boolean = true
  glOnClient: Boolean = false
  glOnServer: Boolean = true
) on ARGUMENT_DEFINITION | INPUT_FIELD_DEFINITION

type User {
    id: ID! @gqId
    name: String
}

interface UserRepository @glRepository(glType: "User", glIdType: "String") @gqJpaQuery() {
    _: String

    findById(id: ID! @gqParam(value: "id")): User @gqQuery(value: """
    select * from User u 
    where u.id = :id
    """)
}
