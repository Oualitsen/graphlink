
directive @glDecorators(
  value: [String!]!
  applyOnClient: Boolean = true
  applyOnServer: Boolean = true
) on FIELD_DEFINITION | OBJECT | INPUT_OBJECT


enum Gender 
@glDecorators(value: ["@Logger"])
{
    male, female
}

interface IBase 
@glDecorators(value: ["@Logger"])

 {
    id: String!
}

input UserInput @glDecorators(value: ["@Input"]) {
    name: String!
}
    
type User @glDecorators(value: ["@Logger"]) {

    id: String! @glDecorators(value: ["@Getter", "@Setter"])
    name: String! @glDecorators(value: ["""@Getter""", """@Setter"""])
    middleName: String @glDecorators(value: ["""@Getter("value")"""])
    married: Boolean!
    listExample: [String!]!
}




