



  
type User {
    id: ID!
    name: String!
    middleName: String
    cars: [Car!]!  @glSkipOnServer
}

type Car {
    make: String!
    model: String!
    userId: ID! @glSkipOnClient
    owner: Owner! @glSkipOnServer
    ownerId: ID! @glSkipOnClient
}

type Owner {
    id: ID!
}

type Query {

   getUser: User
   getUserById(id: ID!): User
   getUsers(name: String, middle: String): [User!]!
   getCarById(id: ID!): Car!

}

  