user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Hide nginx version in headers and error pages
    server_tokens off;

    # Logging
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;

    # Gzip compression
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    server {
        listen       8080;
        server_name  _;
        root         /usr/share/nginx/html;
        index        index.html;

        # Security headers
        add_header X-Content-Type-Options  "nosniff"         always;
        add_header X-Frame-Options         "SAMEORIGIN"      always;
        add_header X-XSS-Protection        "1; mode=block"   always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

        # Cache static assets aggressively (CSS, JS, images, fonts)
        location ~* \.(css|js|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Cache XML / TXT files briefly
        location ~* \.(xml|txt)$ {
            expires 1d;
            add_header Cache-Control "public";
        }

        # HTML — no cache (always get the latest)
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # Main routing — fall back to index.html for unknown paths
        location / {
            try_files $uri $uri/ $uri.html =404;
        }

        # Custom 404
        error_page 404 /index.html;

        # Block access to hidden files
        location ~ /\. {
            deny all;
        }
    }
}
