directive @glUpload on SCALAR

type Todo {
  id: ID!
  title: String!
  completed: Boolean!
}

input CreateTodoInput {
  title: String!
}

type Query {
  todos: [Todo!]!
  todo(id: ID!): Todo
}

type Mutation {
  createTodo(input: CreateTodoInput!): Todo!
  toggleTodo(id: ID!): Todo!
  deleteTodo(id: ID!): Boolean!
}

type Subscription {
  todoAdded: Todo!
}

query getTodos {
  todos { id title completed }
}

query getTodo($id: ID!) {
  todo(id: $id) { id title completed }
}

mutation createTodo($input: CreateTodoInput!) {
  createTodo(input: $input) { id title completed }
}

mutation toggleTodo($id: ID!) {
  toggleTodo(id: $id) { id title completed }
}

mutation deleteTodo($id: ID!) {
  deleteTodo(id: $id)
}

subscription onTodoAdded {
  todoAdded { id title completed }
}
