directive @glCache(ttl: Int!, tags: [String!], staleIfOffline: Boolean) on QUERY | MUTATION | FIELD | FIELD_DEFINITION | OBJECT | INTERFACE | UNION | ENUM | INPUT_OBJECT | SCALAR | SCHEMA
directive @glCacheInvalidate(tags: [String!], all: Boolean) on QUERY | MUTATION | FIELD | FIELD_DEFINITION | OBJECT | INTERFACE | UNION | ENUM | INPUT_OBJECT | SCALAR | SCHEMA

type Owner {
  id: ID!
  name: String!
  email: String!
  cars: [Car!]!
}

type Car {
  id: ID!
  make: String!
  model: String!
  year: Int!
  ownerId: ID
}

input CreateOwnerInput {
  name: String!
  email: String!
}

input CreateCarInput {
  make: String!
  model: String!
  year: Int!
  ownerId: ID
}

type Query {
  getOwner(id: ID!): Owner
  getCar(id: ID!): Car! @glCache(ttl: 60, tags: ["cars"])
  getCarsCount: Int! @glCache(ttl: 60)
  getCarName(id: ID!): String!
}

type Mutation {
  createOwner(input: CreateOwnerInput!): Owner! @glCacheInvalidate(tags: ["persons"])
  createCar(input: CreateCarInput!): Car! @glCacheInvalidate(tags: ["cars"])
}

type Subscription {
  onCarCreated: Car!
  onOwnerCreated: Owner!
}

query getCarAndOwner($carId: ID!, $ownerId: ID!) @glCache(ttl: 60, tags: ["data"]) {
  car: getCar(id: $carId) @glCache(ttl: 60, tags: ["cars"]) {
    ... _all_fields
  }
  getOwner(id: $ownerId) @glCache(ttl: 60, tags: ["persons"]) {
    ... _all_fields
  }
}
