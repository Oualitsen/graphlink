directive @glUpload on SCALAR
directive @glSkipOnServer(mapTo: String, batch: Boolean! = true) on FIELD_DEFINITION|OBJECT|SCALAR|INPUT_FIELD_DEFINITION|INPUT_OBJECT


type Person {
    id: ID!
    name: String!
    age: Int!

    info: CarInfo @glSkipOnServer
}

type CarInfo  @glSkipOnServer(mapTo: "Car", batch: false) {
    id: ID!
    brand: String!
    model: String!
}

type NewCar {
    brandon: String
}

type Car {
    id: ID!
    brand: String!
    model: String!
    owner: Person!
}

input CreatePersonInput {
    name: String!
    age: Int!
}

input CreateCarInput {
    brand: String!
    model: String!
    ownerId: ID!
}

type Query {
    person(id: ID!): Person
    car(id: ID!): Car
}

type Mutation {
    createPerson(input: CreatePersonInput!): Person!
    createCar(input: CreateCarInput!): Car!
}