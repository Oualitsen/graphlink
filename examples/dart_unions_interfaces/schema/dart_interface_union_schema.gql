directive @glUpload on SCALAR
directive @glSkipOnServer(mapTo: String, batch: Boolean! = true) on FIELD_DEFINITION|OBJECT|SCALAR

interface Animal {
    id: ID!
    name: String!
}

type Dog implements Animal {
    id: ID!
    name: String!
    breed: String!
}

type Cat implements Animal {
    id: ID!
    name: String!
    indoor: Boolean!
}

type Query {
    getAnimal: Animal!
}

query getMyAnimal {
    getAnimal {
        ... on Dog {
            breed
        }
       ... on Cat {
            indoor
        }
    }
}

