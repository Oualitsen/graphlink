directive @glCache(ttl: Int!, tags: [String!]) on QUERY | MUTATION | FIELD | FIELD_DEFINITION | OBJECT | INTERFACE | UNION | ENUM | INPUT_OBJECT | SCALAR | SCHEMA

type Owner {
  id: ID!
  name: String!
  email: String!
  cars: [Car!]!
}

type Car {
  id: ID!
  make: String!
  model: String!
  year: Int!
  ownerId: ID
}

input CreateOwnerInput {
  name: String!
  email: String!
}

input CreateCarInput {
  make: String!
  model: String!
  year: Int!
  ownerId: ID
}

type Query {
  getOwner(id: ID!): Owner
  getCar(id: ID!): Car! @glCache(ttl: 60)
  getCarsCount: Int! @glCache(ttl: 60)
  getCarName(id: ID!): String! @glCache(ttl: 60, tags:["test"])
}

type Mutation {
  createOwner(input: CreateOwnerInput!): Owner!
  createCar(input: CreateCarInput!): Car!
}

type Subscription {
  counter: Int!
}
query getCarAndOwner($carId: ID!, $ownerId: ID!)  {
  car: getCar(id: $carId) @glCache(ttl: 60, tag: "carAndOwner") {
    ... _all_fields
  }

  getOwner(id: $ownerId) {
    ... _all_fields
  }
}