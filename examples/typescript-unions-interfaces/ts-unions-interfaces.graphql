
interface Animal {
    id: ID!
    name: String!
}

type Dog implements Animal {
    id: ID!
    name: String!
    breed: String!
}

type Cat implements Animal {
    id: ID!
    name: String!
    indoor: Boolean!
}

type Person {
    id: ID!
    firstName: String!
    lastName: String!
}

type Organization {
    id: ID!
    legalName: String!
    registrationNumber: String!
}

union Owner = Person | Organization

type Query {
    getAnimal(id: ID!): Animal
    listAnimals: [Animal!]!
    getOwner(id: ID!): Owner
}

query getMyAnimal($id: ID!) {
    getAnimal(id: $id) {
        ... on Dog {
            id
            name
            breed
        }
        ... on Cat {
            id
            name
            indoor
        }
    }
}

query getMyOwner($id: ID!) {
    getOwner(id: $id) {
        ... on Person {
            id
            firstName
            lastName
        }
        ... on Organization {
            id
            legalName
            registrationNumber
        }
    }
}

query listMyAnimals {
    listAnimals {
        ... on Dog {
            id
            breed
        }
        ... on Cat {
            id
            indoor
        }
    }
}
